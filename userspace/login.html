<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyprweb Login</title>
    <style>
        body {
            background-color: #222;
            color: #0F0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #333;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            text-align: center;
        }
        h1 {
            color: #0F0;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #0F0;
            background-color: #111;
            color: #0F0;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00FF00;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.7);
        }
        button {
            background-color: #0F0;
            color: #222;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        button:hover {
            background-color: #00CC00;
            color: #FFF;
        }
        .message {
            margin-top: 20px;
            color: #FF0000;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Hyprweb OS Login</h1>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p id="loginMessage" class="message"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('loginMessage');

            // Simple client-side validation for demonstration
            if (username === 'user' && password === 'password') {
                messageElement.style.color = '#0F0';
                messageElement.textContent = 'Login successful! Redirecting...';
                // In a real OS, this would lead to the desktop environment
                setTimeout(() => {
                    alert('Welcome to Hyprweb OS Desktop!');
                    // window.location.href = '/userspace/desktop.html'; // Example redirect
                }, 1500);
            } else {
                messageElement.style.color = '#FF0000';
                messageElement.textContent = 'Invalid username or password.';
            }
        });
    </script>
</body>
</html>
